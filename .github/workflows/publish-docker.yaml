name: Publish Docker Image

on:
  push:
    tags:
      - v[0-9]+.*
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, e.g. v0.0.1"
        required: true
        type: string
      ref:
        description: "Git ref to build; defaults to tag"
        required: false
        type: string
      dry_run:
        description: "Build without pushing"
        required: false
        type: boolean
        default: false
      force_republish:
        description: "Push even if the version tag already exists"
        required: false
        type: boolean
        default: false
      image:
        description: "Full image name override"
        required: false
        type: string

concurrency:
  group: publish-docker-${{ github.ref }}-${{ inputs.tag || '' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  DEFAULT_REGISTRY: ghcr.io
  DEFAULT_IMAGE_NAME: starmetal

jobs:
  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Resolve metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_FORCE_REPUBLISH: ${{ inputs.force_republish }}
          INPUT_IMAGE: ${{ inputs.image }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"
            checkout_ref="${INPUT_REF:-$INPUT_TAG}"
            dry_run="${INPUT_DRY_RUN:-false}"
            force_republish="${INPUT_FORCE_REPUBLISH:-false}"
          else
            tag="${GITHUB_REF#refs/tags/}"
            checkout_ref="$tag"
            dry_run="false"
            force_republish="false"
          fi

          version="${tag#v}"
          image="${INPUT_IMAGE:-}"
          if [[ -z "$image" ]]; then
            owner="${GITHUB_REPOSITORY_OWNER,,}"
            image="${DEFAULT_REGISTRY}/${owner}/${DEFAULT_IMAGE_NAME}"
          fi
          registry_host="${image%%/*}"
          if [[ "$dry_run" != "true" && "$registry_host" != "$DEFAULT_REGISTRY" ]]; then
            echo "::error::Docker publishing is configured for GHCR only. Got: ${registry_host}"
            exit 1
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "checkout_ref=$checkout_ref"
            echo "dry_run=$dry_run"
            echo "force_republish=$force_republish"
            echo "image=$image"
            echo "registry_host=$registry_host"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Docker Publish Metadata"
            echo "- Tag: \`$tag\`"
            echo "- Version: \`$version\`"
            echo "- Image: \`$image\`"
            echo "- Dry run: \`$dry_run\`"
            echo "- Force republish: \`$force_republish\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.checkout_ref }}
          fetch-depth: 0

      - uses: go-task/setup-task@v2
        with:
          version: 3.51.1

      - name: Smoke-test container
        run: task docker:smoke

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: ${{ steps.meta.outputs.dry_run != 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ steps.meta.outputs.registry_host }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check existing Docker tag
        id: existing
        if: ${{ steps.meta.outputs.dry_run != 'true' }}
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          exists=false
          if docker manifest inspect "${IMAGE}:${VERSION}" >/dev/null 2>&1; then
            exists=true
          fi
          echo "exists=$exists" >> "$GITHUB_OUTPUT"
          if [[ "$exists" == "true" ]]; then
            echo "Docker tag ${IMAGE}:${VERSION} already exists." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Extract Docker metadata
        id: docker_meta
        if: ${{ steps.meta.outputs.dry_run == 'true' || steps.meta.outputs.force_republish == 'true' || steps.existing.outputs.exists != 'true' }}
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.meta.outputs.image }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.version }}
            type=raw,value=latest,enable=${{ steps.meta.outputs.prerelease != 'true' }}

      - name: Build and maybe push image
        if: ${{ steps.meta.outputs.dry_run == 'true' || steps.meta.outputs.force_republish == 'true' || steps.existing.outputs.exists != 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.meta.outputs.dry_run != 'true' }}
          provenance: false
          sbom: false
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=publish-docker-starmetal

      - name: Skip existing image
        if: ${{ steps.meta.outputs.dry_run != 'true' && steps.meta.outputs.force_republish != 'true' && steps.existing.outputs.exists == 'true' }}
        run: echo "Skipping Docker publish because the version tag already exists." >> "$GITHUB_STEP_SUMMARY"
