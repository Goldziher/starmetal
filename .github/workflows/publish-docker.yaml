name: Publish Docker Image

on:
  push:
    tags:
      - v[0-9]+.*
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, e.g. v0.1.0"
        required: true
        type: string
      ref:
        description: "Git ref to build; defaults to tag"
        required: false
        type: string
      dry_run:
        description: "Build without pushing"
        required: false
        type: boolean
        default: false
      image:
        description: "Full image name override"
        required: false
        type: string

concurrency:
  group: publish-docker-${{ github.ref }}-${{ inputs.tag || '' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  DEFAULT_REGISTRY: ghcr.io
  DEFAULT_IMAGE_NAME: starmetal

jobs:
  meta:
    name: Resolve Docker metadata
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      image: ${{ steps.meta.outputs.image }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      registry_host: ${{ steps.meta.outputs.registry_host }}
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_IMAGE: ${{ inputs.image }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"
            checkout_ref="${INPUT_REF:-$INPUT_TAG}"
            dry_run="${INPUT_DRY_RUN:-false}"
          else
            tag="${GITHUB_REF#refs/tags/}"
            checkout_ref="$tag"
            dry_run="false"
          fi

          version="${tag#v}"
          image="${INPUT_IMAGE:-}"
          if [[ -z "$image" ]]; then
            owner="${GITHUB_REPOSITORY_OWNER,,}"
            image="${DEFAULT_REGISTRY}/${owner}/${DEFAULT_IMAGE_NAME}"
          fi

          registry_host="${image%%/*}"
          if [[ "$dry_run" != "true" && "$registry_host" != "$DEFAULT_REGISTRY" ]]; then
            echo "::error::Docker publishing is configured for GHCR only. Got: ${registry_host}"
            exit 1
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "checkout_ref=$checkout_ref"
            echo "dry_run=$dry_run"
            echo "image=$image"
            echo "registry_host=$registry_host"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Docker Publish Metadata"
            echo "- Tag: \`$tag\`"
            echo "- Version: \`$version\`"
            echo "- Image: \`$image\`"
            echo "- Dry run: \`$dry_run\`"
            echo "- Prerelease: \`$prerelease\`"
          } >> "$GITHUB_STEP_SUMMARY"

  smoke:
    name: Smoke-test container
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.meta.outputs.checkout_ref }}
          fetch-depth: 0

      - uses: go-task/setup-task@v2
        with:
          version: 3.51.1

      - name: Smoke-test local image
        run: task docker:smoke

  build:
    name: Build Docker image / ${{ matrix.platform }}
    needs: [meta, smoke]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.meta.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: ${{ needs.meta.outputs.dry_run != 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ needs.meta.outputs.registry_host }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and maybe push platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ needs.meta.outputs.dry_run != 'true' }}
          provenance: false
          sbom: false
          tags: |
            ${{ needs.meta.outputs.image }}:${{ needs.meta.outputs.version }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=publish-docker-starmetal-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=publish-docker-starmetal-${{ matrix.suffix }}

  manifest:
    name: Publish Docker manifest
    needs: [meta, build]
    if: needs.meta.outputs.dry_run != 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ needs.meta.outputs.registry_host }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish version manifest
        env:
          IMAGE: ${{ needs.meta.outputs.image }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

      - name: Publish latest manifest
        if: needs.meta.outputs.prerelease != 'true'
        env:
          IMAGE: ${{ needs.meta.outputs.image }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
