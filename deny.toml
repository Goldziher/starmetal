[graph]
all-features = true

[advisories]
unmaintained = "workspace"
unsound = "all"
yanked = "deny"
unused-ignored-advisory = "warn"
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "rsa is pulled only through optional OpenDAL GCS support via reqsign-google and has no fixed version. Remove when upstream ships a fix or GCS signing no longer depends on rsa." },
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8
include-dev = true
unused-allowed-license = "deny"
unused-license-exception = "deny"

[licenses.private]
ignore = true

[bans]
multiple-versions = "allow"
wildcards = "allow"
allow-workspace = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
unused-allowed-source = "deny"
