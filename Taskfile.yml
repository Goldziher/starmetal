version: "3"

vars:
  SCCACHE_BIN:
    sh: command -v sccache || true

env:
  RUSTC_WRAPPER: "{{.SCCACHE_BIN}}"

tasks:
  setup:
    desc: First-time setup — install hooks and generate AI config
    cmds:
      - task: setup:sccache
      - task: setup:prek
      - task: setup:hooks
      - task: setup:ai-rulez

  setup:sccache:
    desc: Install sccache if it is not already available
    status:
      - command -v sccache
    cmds:
      - |
        if ! command -v brew &> /dev/null; then
          echo "Error: Homebrew is not installed. Install sccache manually from https://github.com/mozilla/sccache"
          exit 1
        fi
        brew install sccache

  sccache:stats:
    desc: Show sccache compiler cache statistics
    cmds:
      - |
        if ! command -v sccache &> /dev/null; then
          echo "sccache is not installed. Run: task setup:sccache"
          exit 1
        fi
        sccache --show-stats

  setup:prek:
    desc: Install prek if not present
    status:
      - command -v prek
    cmds:
      - |
        if ! command -v brew &> /dev/null; then
          echo "Error: Homebrew is not installed. Install it from https://brew.sh"
          exit 1
        fi
        brew install prek

  setup:hooks:
    desc: Install pre-commit hooks
    cmds:
      - prek install

  docker:build:
    desc: Build the local Starmetal container image
    cmds:
      - docker build --tag starmetal:local .

  docker:smoke:
    desc: Build the image and smoke-test CLI and API container modes
    cmds:
      - task: docker:build
      - docker run --rm starmetal:local --version
      - docker run --rm starmetal:local config validate
      - |
        set -eu
        container_id="$(docker run --rm --detach --publish 127.0.0.1::8080 starmetal:local)"
        cleanup() {
          docker logs "$container_id" >/dev/null 2>&1 || true
          docker rm --force "$container_id" >/dev/null 2>&1 || true
        }
        trap cleanup EXIT
        port="$(docker port "$container_id" 8080/tcp | awk -F: '{print $NF}')"
        for _ in $(seq 1 30); do
          if curl --fail --silent --show-error --output /dev/null "http://127.0.0.1:${port}/healthz"; then
            exit 0
          fi
          sleep 1
        done
        docker logs "$container_id"
        exit 1

  docker:pressure:
    desc: Alias for the live PyPI Docker pressure test
    cmds:
      - task: docker:pressure:live

  docker:pressure:live:
    desc: Build the image and pressure-test Docker against live PyPI
    cmds:
      - task: docker:build
      - ./docker/pressure-test.sh

  docker:proxy:e2e:
    desc: Run deterministic Docker proxy HTTP, native-client, and pnpm E2E tests
    cmds:
      - task: docker:build
      - STARMETAL_PROXY_E2E_SKIP_BUILD=1 ./docker/proxy-e2e/run.sh --http
      - STARMETAL_PROXY_E2E_SKIP_BUILD=1 ./docker/proxy-e2e/run.sh --native
      - STARMETAL_PROXY_E2E_SKIP_BUILD=1 ./docker/proxy-e2e/run.sh --pnpm

  docker:proxy:e2e:http:
    desc: Run deterministic Docker proxy HTTP E2E tests for all implemented registries
    cmds:
      - ./docker/proxy-e2e/run.sh --http

  docker:proxy:e2e:native:
    desc: Run native-client Docker proxy E2E tests without read auth
    cmds:
      - ./docker/proxy-e2e/run.sh --native

  docker:proxy:e2e:pnpm:
    desc: Run pnpm Docker proxy E2E tests for read-through cache and local npm publish/install
    cmds:
      - ./docker/proxy-e2e/run.sh --pnpm

  docker:publish:e2e:
    desc: Run deterministic Docker publish E2E tests currently supported by local npm/pnpm
    cmds:
      - task: docker:proxy:e2e:pnpm

  docker:proxy:e2e:live:
    desc: Run live Docker proxy E2E tests when available
    cmds:
      - ./docker/proxy-e2e/run.sh --live

  docker:integration:
    desc: Run Docker smoke and deterministic proxy integration tests
    cmds:
      - task: docker:smoke
      - task: docker:proxy:e2e

  docker:run:
    desc: Run Starmetal with filesystem storage in a Docker volume
    cmds:
      - docker run --rm --publish 8080:8080 --volume starmetal-data:/var/lib/starmetal starmetal:local

  docker:publish:ghcr:
    desc: Build and push the Starmetal image to GitHub Container Registry
    cmds:
      - ./scripts/publish-docker-ghcr.sh --push

  release:namespaces:
    desc: Dry-run the npm, PyPI, and crates.io namespace packages
    cmds:
      - ./scripts/release-namespaces.sh --dry-run

  release:namespaces:publish:
    desc: Publish the npm, PyPI, and crates.io namespace packages
    cmds:
      - ./scripts/release-namespaces.sh --publish

  release:sync-version:
    desc: Sync Cargo, npm, PyPI, and wrapper versions for a release
    requires:
      vars: [VERSION]
    cmds:
      - ./scripts/release-bump.sh {{.VERSION}}

  release:dry-run:
    desc: Dispatch package and Docker dry-run release workflows
    requires:
      vars: [VERSION]
    vars:
      REF: '{{.REF | default "main"}}'
    cmds:
      - ./scripts/release-dry-run.sh {{.VERSION}} {{.REF}}

  release:tag:
    desc: Create and push a release tag; package and Docker workflows publish from the tag
    requires:
      vars: [VERSION]
    cmds:
      - ./scripts/release-tag.sh {{.VERSION}}

  setup:ai-rulez:
    desc: Generate AI assistant configuration files
    cmds:
      - npx -y ai-rulez@latest generate --gitignore

  test:generate:
    desc: Generate integration tests from fixtures
    cmds:
      - cargo run -p starmetal-test-generator -- --fixtures crates/starmetal-core/testing_data --output crates/starmetal-core/tests/generated_tests.rs
      - cargo fmt --all

  schema:fetch:
    desc: Download pinned official registry schema/spec artifacts
    cmds:
      - cargo run -p starmetal-schema-manager -- fetch

  schema:generate:
    desc: Generate Starmetal JSON schemas and schema manifest
    cmds:
      - cargo run -p starmetal-schema-manager -- generate

  schema:refresh:
    desc: Download upstream schema/spec artifacts and regenerate schemas
    cmds:
      - cargo run -p starmetal-schema-manager -- refresh

  schema:check:
    desc: Verify fetched schema/spec artifacts and generated schemas are current
    cmds:
      - cargo run -p starmetal-schema-manager -- fetch --check
      - cargo run -p starmetal-schema-manager -- generate --check

  schema:check-live:
    desc: Compare fetched schema/spec artifacts with current upstream sources
    cmds:
      - cargo run -p starmetal-schema-manager -- fetch --check --live

  schema:validate:
    desc: Validate schema files against representative fixtures
    cmds:
      - cargo test -p starmetal-core --test schema_validation

  conformance:
    desc: Run fixture-based registry conformance tests
    cmds:
      - cargo test -p starmetal-conformance-tests

  test:e2e:
    desc: Run live native-client E2E tests for all registries
    cmds:
      - cargo test -p starmetal-integration-tests -- --ignored --test-threads=1

  test:e2e:pypi:
    desc: Run live PyPI/pip E2E tests
    cmds:
      - cargo test -p starmetal-integration-tests --test pypi_pip -- --ignored --test-threads=1

  test:e2e:npm:
    desc: Run live npm E2E tests
    cmds:
      - cargo test -p starmetal-integration-tests --test npm -- --ignored --test-threads=1

  test:e2e:cargo:
    desc: Run live Cargo E2E tests
    cmds:
      - cargo test -p starmetal-integration-tests --test cargo_registry -- --ignored --test-threads=1

  test:e2e:hex:
    desc: Run live Hex/mix E2E tests
    cmds:
      - cargo test -p starmetal-integration-tests --test hex -- --ignored --test-threads=1

  test:e2e:maven:
    desc: Run live Maven E2E tests
    cmds:
      - cargo test -p starmetal-integration-tests --test maven -- --ignored --test-threads=1

  test:e2e:rubygems:
    desc: Run live RubyGems/Bundler E2E tests
    cmds:
      - cargo test -p starmetal-integration-tests --test rubygems -- --ignored --test-threads=1

  test:e2e:nuget:
    desc: Run live NuGet/dotnet E2E tests
    cmds:
      - cargo test -p starmetal-integration-tests --test nuget -- --ignored --test-threads=1

  test:e2e:pub:
    desc: Run live pub.dev/dart E2E tests
    cmds:
      - cargo test -p starmetal-integration-tests --test pubdev -- --ignored --test-threads=1

  fmt:check:
    desc: Check Rust formatting
    cmds:
      - cargo fmt --all -- --check

  clippy:
    desc: Run clippy with warnings denied
    cmds:
      - cargo clippy --workspace --all-targets --all-features -- -D warnings

  build:
    desc: Build the workspace
    cmds:
      - cargo build --workspace

  feature:check:
    desc: Check representative feature flag combinations
    cmds:
      - cargo check -p starmetal-cli --no-default-features --features backend-memory
      - cargo check -p starmetal-cli --no-default-features --features pypi,backend-memory
      - cargo check -p starmetal-cli --no-default-features --features npm,backend-memory
      - cargo check -p starmetal-cli --no-default-features --features cargo-registry,backend-memory
      - cargo check -p starmetal-cli --no-default-features --features hex,backend-memory
      - cargo check -p starmetal-cli --no-default-features --features maven,backend-memory
      - cargo check -p starmetal-cli --no-default-features --features rubygems,backend-memory
      - cargo check -p starmetal-cli --no-default-features --features nuget,backend-memory
      - cargo check -p starmetal-cli --no-default-features --features pub,backend-memory
      - cargo check -p starmetal-cli --no-default-features --features signing-x509,backend-memory
      - cargo check -p starmetal-cli --no-default-features --features pq,backend-memory
      - cargo check -p starmetal-cli --all-features

  deny:
    desc: Run cargo-deny policy checks
    cmds:
      - cargo deny check all

  audit:
    desc: Run cargo-audit with documented temporary ignores from audit.toml
    cmds:
      - cargo audit --ignore RUSTSEC-2023-0071

  security:
    desc: Run Rust dependency policy and advisory checks
    cmds:
      - task: deny
      - task: audit

  generate:
    desc: Regenerate committed artifacts
    cmds:
      - task: schema:generate
      - task: test:generate

  check:
    desc: Run PR-safe offline checks and tests
    cmds:
      - task: schema:check
      - task: schema:validate
      - task: conformance
      - task: test:all

  lint:
    desc: Run pre-commit checks across the repository
    cmds:
      - prek run --all-files

  ci:
    desc: Run PR-safe CI checks
    cmds:
      - task: fmt:check
      - task: clippy
      - task: build
      - task: feature:check
      - task: check
      - task: security

  ci:live-e2e:
    desc: Run live upstream checks and MVP native-client E2E tests
    cmds:
      - task: schema:check-live
      - task: test:e2e:pypi
      - task: test:e2e:npm
      - task: test:e2e:cargo
      - task: test:e2e:hex

  test:all:
    desc: Run all tests
    cmds:
      - cargo test --workspace

  update:
    desc: Update all dependencies and tools
    cmds:
      - echo "Updating Rust dependencies..."
      - cargo upgrade --incompatible
      - echo "Updating pre-commit hooks..."
      - prek autoupdate
      - echo "All dependencies updated"
